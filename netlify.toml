# Netlify 設定ファイル
# セキュリティヘッダー・リダイレクト設定

# ビルド設定（静的サイトのためビルドコマンドは不要）
[build]
  publish = "."

# 全ページ共通セキュリティヘッダー
[[headers]]
  for = "/*"
  [headers.values]
    # クリックジャッキング防止
    X-Frame-Options = "DENY"
    # MIMEタイプスニッフィング防止
    X-Content-Type-Options = "nosniff"
    # リファラー情報の制御
    Referrer-Policy = "strict-origin-when-cross-origin"
    # 不要なブラウザ機能の無効化
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Content Security Policy
    # BASE ウィジェットを使用する場合は base.com を script-src に追加してください
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' https://fonts.googleapis.com;
      style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self';
      frame-src https://yamazaki-noen.base.shop https://*.base.shop;
      form-action 'self';
      base-uri 'self';
      upgrade-insecure-requests;
    """

# キャッシュ設定（CSS・JS・画像は長期キャッシュ）
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTMLはキャッシュしない（更新をすぐ反映）
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# 存在しないページは404へ
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
