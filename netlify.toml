# Netlify 設定ファイル
# セキュリティヘッダー・リダイレクト設定

# ビルド設定（静的サイトのためビルドコマンドは不要）
[build]
  publish = "."

# 全ページ共通セキュリティヘッダー
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' https://identity.netlify.com;
      style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://identity.netlify.com https://*.netlify.com;
      frame-src https://yamazaki-noen.base.shop https://*.base.shop;
      form-action 'self';
      base-uri 'self';
      upgrade-insecure-requests;
    """

# 管理画面は Decap CMS・Netlify Identity のスクリプトが必要なため CSP を緩和
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = """
      default-src 'self' https:;
      script-src 'self' https: 'unsafe-inline' 'unsafe-eval';
      style-src 'self' https: 'unsafe-inline';
      img-src 'self' data: https: blob:;
      font-src 'self' https: data:;
      connect-src 'self' https:;
      frame-src 'self' https:;
    """

# キャッシュ設定（CSS・JS・画像は長期キャッシュ）
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTMLはキャッシュしない（更新をすぐ反映）
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# 内部設定ディレクトリへのアクセスを強制ブロック（多重防御）
[[redirects]]
  from = "/.claude/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/.DS_Store"
  to = "/index.html"
  status = 404
  force = true

# 存在しないページは404へ
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
